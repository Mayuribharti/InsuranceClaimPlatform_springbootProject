spring.application.name=policy

server.port=8081
#MYSQL database connection
spring.datasource.url=jdbc:mysql://localhost:3306/policyDB
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#Spring boot actuator
#http://localhost:8081/actuator
management.endpoints.web.exposure.include=*

# Show class name in logs
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] [%logger{36}] - %msg%n

# Log file (optional)
logging.file.name=logs/application.log

# Log levels
logging.level.root=INFO
logging.level.com.insurance.policy=DEBUG
